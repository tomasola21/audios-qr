<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Información del Producto</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Poppins',sans-serif;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;

    overflow:hidden;

    background:
    radial-gradient(circle at top left,#8b5cf6,#1e1b4b 45%),
    radial-gradient(circle at bottom right,#06b6d4,#0f172a 65%);

}

body::before{

    content:"";

    position:fixed;

    width:450px;

    height:450px;

    border-radius:50%;

    background:
    linear-gradient(
        135deg,
        rgba(0,229,255,.4),
        rgba(139,92,246,.4)
    );

    top:-150px;

    right:-120px;

    filter:blur(120px);

}

body::after{

    content:"";

    position:fixed;

    width:350px;

    height:350px;

    border-radius:50%;

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,.15),
        rgba(0,229,255,.15)
    );

    bottom:-120px;

    left:-100px;

    filter:blur(100px);

}

.contenedor{

    position:relative;

    width:100%;

    max-width:430px;

    text-align:center;

    padding:40px 30px;

    border-radius:40px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(25px);

    border:1px solid rgba(255,255,255,.15);

    box-shadow:
    0 25px 60px rgba(0,0,0,.35);

    overflow:hidden;

    animation:entrada .8s ease;

}

@keyframes entrada{

    from{
        opacity:0;
        transform:translateY(30px) scale(.95);
    }

    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }

}

.orbita{

    position:absolute;

    width:260px;

    height:260px;

    border-radius:50%;

    background:
    linear-gradient(
        135deg,
        #00e5ff,
        #8b5cf6
    );

    top:-100px;

    right:-90px;

    opacity:.35;

    filter:blur(70px);

}

.imagen-producto{

    position:relative;

    width:190px;

    height:190px;

    object-fit:contain;

    background:white;

    padding:15px;

    border-radius:50%;

    box-shadow:
    0 0 30px rgba(0,229,255,.5),
    0 15px 35px rgba(0,0,0,.2);

}

.tag{

    margin-top:22px;

    display:inline-block;

    padding:10px 22px;

    border-radius:999px;

    background:#00e5ff;

    color:#0f172a;

    font-weight:700;

    font-size:12px;

    letter-spacing:1px;

}

h1{

    margin-top:20px;

    color:white;

    font-size:34px;

    font-weight:700;

    line-height:1.2;

}

.marca{

    margin-top:10px;

    color:#dbeafe;

    font-size:17px;

}

.precio{

    margin-top:25px;

    font-size:58px;

    font-weight:800;

    color:#00e5ff;

    text-shadow:
    0 0 20px rgba(0,229,255,.5);

}

.datos{

    margin-top:25px;

    display:flex;

    gap:15px;

}

.dato{

    flex:1;

    padding:18px;

    border-radius:22px;

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.1);

}

.dato span{

    display:block;

    color:#cbd5e1;

    font-size:13px;

    margin-bottom:8px;

}

.dato strong{

    color:white;

    font-size:20px;

}

.fecha{

    color:#ff6b6b !important;
}

.info{

    margin-top:25px;

    padding:18px;

    border-radius:20px;

    background:rgba(255,255,255,.08);

    color:#f1f5f9;

    line-height:1.6;

}

.icono-audio{

    margin-top:20px;

    color:#dbeafe;

    font-size:14px;

    animation:parpadeo 1.5s infinite;

}

@keyframes parpadeo{

    0%{opacity:.4;}
    50%{opacity:1;}
    100%{opacity:.4;}

}

@media(max-width:480px){

    .contenedor{

        padding:30px 20px;

    }

    h1{

        font-size:28px;

    }

    .precio{

        font-size:46px;

    }

    .imagen-producto{

        width:160px;
        height:160px;

    }

    .datos{

        flex-direction:column;

    }

}

</style>
</head>

<body onclick="reproducirAudio()">

<div class="contenedor">

    <div class="orbita"></div>

    <img src="Producto1.jpg" class="imagen-producto">

    <div class="tag">
        PRODUCTO ESCANEADO
    </div>

    <h1>
        Azucar Impalpable
    </h1>

    <div class="marca">
        Marca: Bell's
    </div>

    <div class="precio">
        S/. 1.90
    </div>

    <div class="datos">

        <div class="dato">
            <span>Peso Neto</span>
            <strong>180g</strong>
        </div>

        <div class="dato">
            <span>Vencimiento</span>
            <strong class="fecha">12/03/27</strong>
        </div>

    </div>

    <div class="info">
        Producto de consumo diario • Calidad garantizada
    </div>

    <div class="icono-audio">
        🔊 Toque la pantalla para escuchar
    </div>

</div>

<audio id="audio" hidden>
    <source src="Producto1.mp3" type="audio/mpeg">
</audio>

<script>

let reproducido = false;

function reproducirAudio(){

    if(reproducido) return;

    const audio = document.getElementById("audio");

    audio.play().catch(() => {});

    reproducido = true;
}

</script>

</body>
</html>
