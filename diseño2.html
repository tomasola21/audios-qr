<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Información del Producto</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:#f4f6f8;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.contenedor{
    width:100%;
    max-width:900px;
    background:white;
    border-radius:30px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,.12);
    animation:entrada .7s ease;
}

@keyframes entrada{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.header{
    background:linear-gradient(135deg,#00a651,#38c172);
    color:white;
    padding:20px;
    text-align:center;
}

.header h2{
    font-size:28px;
    margin-bottom:8px;
}

.badge{
    display:inline-block;
    background:#ffd500;
    color:#222;
    padding:10px 18px;
    border-radius:999px;
    font-weight:bold;
    font-size:14px;
}

.contenido{
    display:flex;
    align-items:center;
    gap:30px;
    padding:35px;
}

.imagen-area{
    flex:1;
    text-align:center;
}

.imagen-producto{
    width:100%;
    max-width:280px;
    height:280px;
    object-fit:contain;
    background:white;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.12);
    padding:15px;
    transition:.3s;
}

.imagen-producto:hover{
    transform:scale(1.04);
}

.info{
    flex:1;
}

.nombre{
    font-size:38px;
    color:#222;
    font-weight:700;
    margin-bottom:10px;
}

.marca{
    font-size:18px;
    color:#666;
    margin-bottom:20px;
}

.precio{
    display:inline-block;
    background:#00a651;
    color:white;
    padding:12px 25px;
    border-radius:15px;
    font-size:42px;
    font-weight:bold;
    margin-bottom:25px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.card-info{
    background:#f8fafb;
    border:2px solid #e9eef2;
    border-radius:18px;
    padding:18px;
}

.titulo{
    color:#888;
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:1px;
    margin-bottom:8px;
}

.valor{
    font-size:22px;
    font-weight:700;
    color:#222;
}

.fecha{
    color:#e63946;
}

.calidad{
    margin-top:20px;
    background:#fff8dd;
    border-left:5px solid #ffd500;
    padding:15px;
    border-radius:12px;
    color:#555;
    line-height:1.6;
}

.audio{
    margin-top:20px;
    text-align:center;
    color:#999;
    animation:parpadeo 1.5s infinite;
}

@keyframes parpadeo{
    0%{opacity:.4;}
    50%{opacity:1;}
    100%{opacity:.4;}
}

@media(max-width:768px){

    .contenido{
        flex-direction:column;
        text-align:center;
        padding:25px;
    }

    .nombre{
        font-size:30px;
    }

    .precio{
        font-size:36px;
    }

    .grid{
        grid-template-columns:1fr;
    }

    .imagen-producto{
        max-width:220px;
        height:220px;
    }
}

</style>
</head>

<body onclick="reproducirAudio()">

<div class="contenedor">

    <div class="header">

        <h2>Información del Producto</h2>

        <div class="badge">
            Producto Escaneado
        </div>

    </div>

    <div class="contenido">

        <div class="imagen-area">

            <img src="Producto1.jpg" class="imagen-producto">

        </div>

        <div class="info">

            <div class="nombre">
                Azucar Impalpable
            </div>

            <div class="marca">
                Marca: Bell's
            </div>

            <div class="precio">
                S/. 1.90
            </div>

            <div class="grid">

                <div class="card-info">
                    <div class="titulo">
                        Peso Neto
                    </div>
                    <div class="valor">
                        180g
                    </div>
                </div>

                <div class="card-info">
                    <div class="titulo">
                        Vencimiento
                    </div>
                    <div class="valor fecha">
                        12/03/27
                    </div>
                </div>

            </div>

            <div class="calidad">
                Producto de consumo diario • Calidad garantizada
            </div>

            <div class="audio">
                🔊 Toque la pantalla para escuchar
            </div>

        </div>

    </div>

</div>

<audio id="audio" hidden>
    <source src="Producto1.mp3" type="audio/mpeg">
</audio>

<script>

let reproducido = false;

function reproducirAudio(){

    if(reproducido) return;

    const audio = document.getElementById("audio");

    audio.play().catch(() => {});

    reproducido = true;
}

</script>

</body>
</html>
