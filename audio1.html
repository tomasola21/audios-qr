<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectura Automática de Texto</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }
        .contenedor {
            text-align: center;
            padding: 30px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 15px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h2>Lectura de Texto Automática</h2>
        <p id="texto-a-leer">Producto: Aceite. Precio: 7.50 nuevos soles.</p>
        
        <button onclick="reproducirTexto()">Escuchar de nuevo</button>
    </div>

    <script>
        function reproducirTexto() {
            // Capturamos el texto que queremos que lea
            const texto = document.getElementById("texto-a-leer").innerText;
            
            // Creamos el objeto de mensaje
            const mensaje = new SpeechSynthesisUtterance(texto);
            
            // Configuramos el idioma (Español)
            mensaje.lang = "es-ES";
            
            // Opcional: Ajustar velocidad (1 es normal, 1.5 más rápido, 0.8 más lento)
            mensaje.rate = 1; 
            
            // Opcional: Ajustar tono (1 es normal)
            mensaje.pitch = 1; 

            // Ejecutamos la reproducción de voz
            window.speechSynthesis.speak(mensaje);
        }

        // Intentar reproducir automáticamente al cargar la página
        window.addEventListener("DOMContentLoaded", () => {
            // Un pequeño retraso para asegurar que el navegador responda bien
            setTimeout(() => {
                reproducirTexto();
            }, 500);
        });
    </script>

</body>
</html>
