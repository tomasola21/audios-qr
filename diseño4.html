<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Información del Producto</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Segoe UI,sans-serif;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at top left,#5b21b6,#0f172a 40%),
    radial-gradient(circle at bottom right,#2563eb,#020617 60%);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.dashboard{

    width:100%;
    max-width:1000px;

    background:rgba(15,23,42,.75);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.08);

    border-radius:30px;

    overflow:hidden;

    box-shadow:
    0 20px 60px rgba(0,0,0,.4);

}

.topbar{

    padding:20px 30px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    border-bottom:1px solid rgba(255,255,255,.08);

}

.logo{

    color:white;
    font-size:22px;
    font-weight:700;
    letter-spacing:1px;

}

.estado{

    background:rgba(34,197,94,.15);

    color:#22c55e;

    padding:10px 18px;

    border-radius:50px;

    font-size:13px;

    font-weight:600;
}

.contenido{

    display:grid;

    grid-template-columns:350px 1fr;

    gap:25px;

    padding:25px;

}

.panel{

    background:rgba(255,255,255,.04);

    border:1px solid rgba(255,255,255,.08);

    border-radius:25px;

    padding:25px;

}

.panel-imagen{

    text-align:center;

}

.imagen-producto{

    width:100%;

    max-width:240px;

    height:240px;

    object-fit:contain;

    background:white;

    border-radius:20px;

    padding:15px;

    box-shadow:0 15px 35px rgba(0,0,0,.25);

}

.ia{

    margin-top:20px;

    color:#a5b4fc;

    font-size:14px;

    letter-spacing:2px;

    text-transform:uppercase;
}

.nombre{

    color:white;

    font-size:38px;

    font-weight:800;

    margin-bottom:10px;

}

.marca{

    color:#94a3b8;

    margin-bottom:20px;

    font-size:18px;
}

.precio{

    font-size:55px;

    font-weight:800;

    background:linear-gradient(90deg,#60a5fa,#c084fc);

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;

    margin-bottom:25px;
}

.grid{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:15px;

}

.card{

    background:rgba(255,255,255,.05);

    border-radius:20px;

    padding:18px;
}

.card-title{

    color:#94a3b8;

    font-size:13px;

    text-transform:uppercase;

    margin-bottom:8px;
}

.card-value{

    color:white;

    font-size:22px;

    font-weight:700;
}

.fecha{

    color:#f87171;
}

.info{

    margin-top:20px;

    background:linear-gradient(
        135deg,
        rgba(96,165,250,.12),
        rgba(192,132,252,.12)
    );

    border-radius:20px;

    padding:18px;

    color:#dbeafe;

    line-height:1.7;
}

.audio{

    margin-top:20px;

    color:#cbd5e1;

    text-align:center;

    animation:pulse 1.5s infinite;
}

@keyframes pulse{

    0%{opacity:.4;}
    50%{opacity:1;}
    100%{opacity:.4;}

}

.barra{

    margin-top:20px;

    height:10px;

    background:rgba(255,255,255,.08);

    border-radius:20px;

    overflow:hidden;
}

.barra::after{

    content:"";

    display:block;

    width:100%;

    height:100%;

    background:linear-gradient(
        90deg,
        #60a5fa,
        #c084fc
    );

}

@media(max-width:850px){

    .contenido{

        grid-template-columns:1fr;

    }

    .nombre{

        font-size:30px;

        text-align:center;

    }

    .marca{

        text-align:center;

    }

    .precio{

        text-align:center;

        font-size:45px;

    }

    .grid{

        grid-template-columns:1fr;

    }

}

</style>
</head>

<body onclick="reproducirAudio()">

<div class="dashboard">

    <div class="topbar">

        <div class="logo">
            PRODUCT ANALYTICS
        </div>

        <div class="estado">
            ● PRODUCTO ESCANEADO
        </div>

    </div>

    <div class="contenido">

        <div class="panel panel-imagen">

            <img src="Producto1.jpg" class="imagen-producto">

            <div class="ia">
                Smart Product Recognition
            </div>

            <div class="barra"></div>

        </div>

        <div class="panel">

            <div class="nombre">
                Azucar Impalpable
            </div>

            <div class="marca">
                Marca: Bell's
            </div>

            <div class="precio">
                S/. 1.90
            </div>

            <div class="grid">

                <div class="card">

                    <div class="card-title">
                        Peso Neto
                    </div>

                    <div class="card-value">
                        180g
                    </div>

                </div>

                <div class="card">

                    <div class="card-title">
                        Vencimiento
                    </div>

                    <div class="card-value fecha">
                        12/03/27
                    </div>

                </div>

            </div>

            <div class="info">
                Producto de consumo diario • Calidad garantizada
            </div>

            <div class="audio">
                🔊 Toque la pantalla para escuchar
            </div>

        </div>

    </div>

</div>

<audio id="audio" hidden>
    <source src="Producto1.mp3" type="audio/mpeg">
</audio>

<script>

let reproducido = false;

function reproducirAudio(){

    if(reproducido) return;

    const audio = document.getElementById("audio");

    audio.play().catch(()=>{});

    reproducido = true;
}

</script>

</body>
</html>
