<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Información del Producto</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:
    radial-gradient(circle at top,#13213b,#050814 60%),
    #050814;
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    linear-gradient(rgba(0,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,.03) 1px, transparent 1px);
    background-size:35px 35px;
    pointer-events:none;
}

.panel{
    width:100%;
    max-width:450px;
    background:rgba(10,15,30,.88);
    border:1px solid rgba(0,255,255,.35);
    border-radius:28px;
    overflow:hidden;
    box-shadow:
    0 0 15px rgba(0,255,255,.25),
    0 0 40px rgba(0,255,255,.12),
    inset 0 0 25px rgba(0,255,255,.05);
    backdrop-filter:blur(12px);
    animation:entrada .8s ease;
}

@keyframes entrada{
    from{
        opacity:0;
        transform:scale(.92);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

.cabecera{
    padding:22px;
    text-align:center;
    border-bottom:1px solid rgba(0,255,255,.2);
}

.estado{
    display:inline-block;
    padding:10px 18px;
    border-radius:50px;
    border:1px solid #00ffff;
    color:#00ffff;
    font-size:13px;
    font-weight:bold;
    letter-spacing:2px;
    text-transform:uppercase;
    box-shadow:0 0 12px rgba(0,255,255,.4);
}

.contenido{
    padding:30px;
    text-align:center;
}

.imagen-wrap{
    position:relative;
    display:inline-flex;
    justify-content:center;
    align-items:center;
}

.imagen-wrap::before{
    content:"";
    position:absolute;
    width:220px;
    height:220px;
    border-radius:50%;
    background:rgba(0,255,255,.08);
    filter:blur(20px);
}

.imagen-producto{
    position:relative;
    width:190px;
    height:190px;
    object-fit:contain;
    background:white;
    border-radius:20px;
    padding:10px;
    z-index:1;
    box-shadow:0 0 25px rgba(0,255,255,.35);
}

.nombre{
    margin-top:25px;
    color:white;
    font-size:32px;
    font-weight:700;
}

.marca{
    margin-top:8px;
    color:#91b4d6;
    font-size:17px;
}

.precio{
    margin-top:22px;
    font-size:48px;
    font-weight:800;
    color:#00ffff;
    text-shadow:
    0 0 8px rgba(0,255,255,.7),
    0 0 25px rgba(0,255,255,.5);
}

.datos{
    margin-top:25px;
    display:grid;
    gap:15px;
}

.bloque{
    background:rgba(255,255,255,.03);
    border:1px solid rgba(0,255,255,.15);
    border-radius:18px;
    padding:15px;
}

.label{
    color:#79a8c8;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:1.5px;
    margin-bottom:8px;
}

.valor{
    color:white;
    font-size:22px;
    font-weight:700;
}

.fecha{
    color:#ff4d6d;
    text-shadow:0 0 10px rgba(255,77,109,.5);
}

.info{
    margin-top:20px;
    padding:16px;
    border-radius:15px;
    background:rgba(0,255,255,.05);
    border:1px solid rgba(0,255,255,.15);
    color:#b8d5ef;
    line-height:1.6;
}

.audio{
    margin-top:20px;
    color:#00ffff;
    font-size:14px;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{opacity:.4;}
    50%{opacity:1;}
    100%{opacity:.4;}
}

@media(max-width:480px){

    .contenido{
        padding:22px;
    }

    .nombre{
        font-size:28px;
    }

    .precio{
        font-size:40px;
    }

    .imagen-producto{
        width:170px;
        height:170px;
    }

    .imagen-wrap::before{
        width:190px;
        height:190px;
    }
}

</style>
</head>

<body onclick="reproducirAudio()">

<div class="panel">

    <div class="cabecera">
        <div class="estado">
            Producto Escaneado
        </div>
    </div>

    <div class="contenido">

        <div class="imagen-wrap">
            <img src="Producto1.jpg" class="imagen-producto">
        </div>

        <div class="nombre">
            Azucar Impalpable
        </div>

        <div class="marca">
            Marca: Bell's
        </div>

        <div class="precio">
            S/. 1.90
        </div>

        <div class="datos">

            <div class="bloque">
                <div class="label">
                    Peso Neto
                </div>
                <div class="valor">
                    180g
                </div>
            </div>

            <div class="bloque">
                <div class="label">
                    Fecha de Vencimiento
                </div>
                <div class="valor fecha">
                    12/03/27
                </div>
            </div>

        </div>

        <div class="info">
            Producto de consumo diario • Calidad garantizada
        </div>

        <div class="audio">
            🔊 Toque la pantalla para escuchar
        </div>

    </div>

</div>

<audio id="audio" hidden>
    <source src="Producto1.mp3" type="audio/mpeg">
</audio>

<script>

let reproducido = false;

function reproducirAudio(){

    if(reproducido) return;

    const audio = document.getElementById("audio");

    audio.play().catch(() => {});

    reproducido = true;
}

</script>

</body>
</html>
