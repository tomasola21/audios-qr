<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Información del Producto</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#f8f9ff,#e7f0ff);
    font-family:Arial, sans-serif;
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    background:rgba(0,123,255,0.08);
    border-radius:50%;
    top:-120px;
    right:-120px;
}

body::after{
    content:"";
    position:absolute;
    width:250px;
    height:250px;
    background:rgba(0,123,255,0.05);
    border-radius:50%;
    bottom:-80px;
    left:-80px;
}

.contenedor{
    position:relative;
    width:90%;
    max-width:420px;
    background:white;
    border-radius:30px;
    padding:35px 28px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.12);
    animation:entrada 0.8s ease;
    border:1px solid rgba(255,255,255,0.5);
    backdrop-filter:blur(10px);
}

@keyframes entrada{
    from{
        opacity:0;
        transform:translateY(25px) scale(0.95);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

.imagen-producto{
    width:190px;
    height:190px; /* tamaño fijo */
    object-fit:contain;
    background:white;
    border-radius:22px;
    margin-bottom:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    transition:0.3s;
}

.imagen-producto:hover{
    transform:scale(1.03);
}

.etiqueta{
    display:inline-block;
    background:#e9f3ff;
    color:#0077ff;
    padding:8px 18px;
    border-radius:50px;
    font-size:14px;
    font-weight:bold;
    margin-bottom:15px;
}

h1{
    font-size:32px;
    margin:10px 0;
    color:#222;
}

.precio{
    font-size:38px;
    font-weight:bold;
    color:#0077ff;
    margin:18px 0;
}

.detalle{
    font-size:18px;
    color:#666;
    line-height:1.7;
    margin-top:8px;
}

.detalle strong{
    color:#222;
}

.fecha{
    color:#ff0000 !important;
    font-weight:bold;
    font-size:20px;
}

.info-box{
    margin-top:25px;
    background:#f7faff;
    padding:15px;
    border-radius:18px;
    font-size:16px;
    color:#555;
    border:1px solid #e5efff;
}

.icono-audio{
    margin-top:18px;
    font-size:14px;
    color:#999;
    animation:parpadeo 1.5s infinite;
}

@keyframes parpadeo{
    0%{opacity:0.5;}
    50%{opacity:1;}
    100%{opacity:0.5;}
}

</style>
</head>

<body onclick="reproducirAudio()">

<div class="contenedor">

    <div class="etiqueta">
        Producto Escaneado
    </div>

    <img src="Producto1.jpg" class="imagen-producto">

    <h1>
        Azúcar Impalpable
    </h1>

    <div class="detalle">
        <strong>Marca:</strong> Bell's
    </div>

    <div class="precio">
        S/. 1.90
    </div>

    <div class="detalle">
        <strong>Peso Neto:</strong> 180g
    </div>

    <div class="detalle">
        Fecha de vencimiento:<br>
        <strong class="fecha">12/03/27</strong>
    </div>

    <div class="info-box">
        Producto de consumo diario • Calidad garantizada
    </div>

    <div class="icono-audio">
        🔊 Toque la pantalla para escuchar
    </div>

</div>

<audio id="audio" hidden>
    <source src="Producto1.mp3" type="audio/mpeg">
</audio>

<script>
let reproducido = false;

/* Vibración automática al abrir */
window.addEventListener("load", () => {

    if (navigator.vibrate) {
        navigator.vibrate([300, 100, 300]);
    }

});

function reproducirAudio() {

    if(reproducido) return;

    const audio = document.getElementById("audio");

    audio.play().catch(() => {});

    reproducido = true;
}

let reproducido = false;

function reproducirAudio() {

    if(reproducido) return;

    const audio = document.getElementById("audio");

    audio.play().catch(() => {});

    reproducido = true;
}

</script>

</body>
</html>
