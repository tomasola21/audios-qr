<!DOCTYPE html>
<html>
<body style="margin:0;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial;">

<audio id="audio" autoplay controls muted>
  <source src="Producto1.mp3" type="audio/mpeg">
</audio>

<script>
window.onload = async () => {
  const audio = document.getElementById("audio");

  try {
    await audio.play();

    setTimeout(() => {
      audio.muted = false;
    }, 500);

  } catch (e) {
    console.log("Autoplay bloqueado");
  }
};
</script>

</body>
</html>
