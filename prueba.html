<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Información del producto</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background:white;
    text-align:center;
    padding:20px;
}

h1{
    font-size:32px;
}
</style>
</head>

<body>

<h1>
Cargando información del producto...
</h1>

<script>
window.onload = () => {

    const mensaje = new SpeechSynthesisUtterance(
        "Bienvenido. Este producto contiene información accesible para personas con discapacidad visual."
    );

    mensaje.lang = "es-ES";
    mensaje.volume = 1;
    mensaje.rate = 1;
    mensaje.pitch = 1;

    speechSynthesis.speak(mensaje);
}
</script>

</body>
